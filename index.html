<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>German Flashcards</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f7f7f8;color:#111827;min-height:100vh;padding:20px;line-height:1.5}
.container{max-width:600px;margin:0 auto;display:flex;flex-direction:column;min-height:calc(100vh - 40px)}
h1{font-size:28px;margin-bottom:8px}
h2{font-size:20px;margin-bottom:4px}
p{color:#1f2937;margin-bottom:16px}
.muted{color:#6b7280;font-size:13px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.card.active{border-color:#111827;border-width:2px;padding:19px}
button{font:inherit;cursor:pointer;padding:14px 18px;border-radius:12px;border:1px solid;font-weight:600;font-size:16px;width:100%;margin-bottom:12px;transition:opacity 0.15s}
button:hover:not(:disabled){opacity:0.85}
button:disabled{opacity:0.5;cursor:not-allowed}
.btn-primary{background:#111827;color:#fff;border-color:#111827}
.btn-secondary{background:#fff;color:#111827;border-color:#d1d5db}
.btn-danger{background:#fee2e2;color:#991b1b;border-color:#fecaca}
.btn-subtle{background:#f3f4f6;color:#111827;border-color:#e5e7eb}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.grid-3 .card{margin-bottom:0;padding:14px 10px;text-align:center}
.row{display:flex;gap:8px}
.row > *{flex:1;margin-bottom:0}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.grid-2 button{margin-bottom:0}
.flashcard{min-height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:12px;cursor:pointer;user-select:none;transition:transform 0.15s ease;position:relative}
.flashcard:active{transform:scale(0.99)}
.flashcard .german{font-size:34px;font-weight:700}
.flashcard .translation{font-size:22px;font-weight:600;margin-top:4px}
.flashcard .meaning{color:#4b5563;font-size:15px;line-height:1.4;font-style:italic;margin-top:2px}
.flashcard .front-example{font-size:18px;color:#4b5563;font-style:italic;margin-top:16px;max-width:90%;line-height:1.45}
.flashcard .flip-hint{position:absolute;top:12px;right:14px;font-size:11px;color:#9ca3af;letter-spacing:0.5px;text-transform:uppercase;font-weight:600}
.gender-badge{display:inline-block;padding:4px 14px;border-radius:999px;font-size:16px;font-weight:700;letter-spacing:0.5px}
.gender-der{background:#dbeafe;color:#1e40af}
.gender-die{background:#fce7f3;color:#9d174d}
.gender-das{background:#d1fae5;color:#065f46}
.example-block{margin-top:10px;padding:12px 16px;background:#f9fafb;border-radius:10px;border-left:3px solid #d1d5db;text-align:left;width:100%}
.example-block .ex-de{font-weight:600;font-size:15px;color:#111827}
.example-block .ex-en{color:#6b7280;font-size:14px;margin-top:4px}
.example-block .case-label{font-size:11px;font-weight:700;color:#6b7280;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px}
.example-block.case-nom{border-left-color:#3b82f6}
.example-block.case-akk{border-left-color:#f59e0b}
.example-block.case-dat{border-left-color:#10b981}
.example-block.case-nom .case-label{color:#1e40af}
.example-block.case-akk .case-label{color:#92400e}
.example-block.case-dat .case-label{color:#065f46}
.header-row{display:flex;justify-content:space-between;margin-bottom:12px}
.stats-row{display:flex;justify-content:space-between;padding:4px 0}
.stats-row .val{font-weight:600}
.level-option{cursor:pointer;user-select:none}
.level-option .state{color:#6b7280;font-size:14px}
.spacer{flex:1}
.size-label{font-size:14px;color:#6b7280;margin-bottom:6px;margin-top:4px}
.size-row{display:flex;gap:8px;margin-bottom:16px}
.size-row button{margin-bottom:0;padding:10px}
.size-row button.active{background:#111827;color:#fff;border-color:#111827}
/* Audio button on flashcard */
.audio-btn{position:absolute;top:12px;left:14px;background:#fff;border:1px solid #e5e7eb;border-radius:999px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;padding:0;margin:0;line-height:1}
.audio-btn:hover{background:#f3f4f6}
.audio-btn:active{transform:scale(0.92)}
.audio-btn.speaking{background:#dbeafe;border-color:#3b82f6}
/* Card flip animation */
.flashcard.flip-anim{animation:flipIn 0.28s ease}
@keyframes flipIn{from{opacity:0;transform:rotateY(-90deg)}to{opacity:1;transform:rotateY(0)}}
/* Streak chip on home */
.streak-chip{display:inline-flex;align-items:center;gap:6px;background:#fef3c7;color:#92400e;padding:6px 14px;border-radius:999px;font-size:14px;font-weight:600;margin-bottom:12px}
/* Session summary */
.summary-stat{display:flex;justify-content:space-between;align-items:center;padding:14px 4px;border-bottom:1px solid #e5e7eb}
.summary-stat:last-child{border-bottom:none}
.summary-stat .label{color:#6b7280;font-size:14px}
.summary-stat .value{font-weight:700;font-size:20px;color:#111827}
.summary-emoji{font-size:48px;text-align:center;margin-bottom:8px;display:block}
/* Dark mode */
@media (prefers-color-scheme: dark) {
  body{background:#0f1419;color:#e8e8e8}
  h1,h2{color:#e8e8e8}
  p{color:#d1d5db}
  .muted{color:#8a8a8a}
  .card{background:#1a2026;border-color:#2a3038;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
  .card.active{border-color:#fff}
  button{}
  .btn-primary{background:#e8e8e8;color:#0f1419;border-color:#e8e8e8}
  .btn-secondary{background:#1a2026;color:#e8e8e8;border-color:#2a3038}
  .btn-danger{background:#4a1e1e;color:#fca5a5;border-color:#5a2828}
  .btn-subtle{background:#222831;color:#e8e8e8;border-color:#2a3038}
  .size-row button.active{background:#e8e8e8;color:#0f1419;border-color:#e8e8e8}
  .flashcard .german{color:#e8e8e8}
  .flashcard .translation{color:#e8e8e8}
  .flashcard .meaning{color:#a8a8a8}
  .flashcard .front-example{color:#a8a8a8}
  .flashcard .flip-hint{color:#6a6a6a}
  .example-block{background:#0f1419;border-color:#2a3038}
  .example-block .ex-de{color:#e8e8e8}
  .example-block .ex-en{color:#8a8a8a}
  .audio-btn{background:#1a2026;border-color:#2a3038;color:#e8e8e8}
  .audio-btn:hover{background:#222831}
  .audio-btn.speaking{background:#1e3a5f;border-color:#3b82f6}
  .streak-chip{background:#3d2a0a;color:#fbbf24}
  .summary-stat{border-color:#2a3038}
  .summary-stat .value{color:#e8e8e8}
  .level-chip{background:#222831;color:#a8a8a8}
  .level-chip.chip-cases{background:#3d2a0a;color:#fbbf24}
  .case-table{background:#1a2026;border-color:#2a3038}
  .case-table th{background:#0f1419;color:#a8a8a8}
  .case-table th,.case-table td{border-color:#2a3038}
  .case-table td:first-child{color:#e8e8e8}
  .grammar-rule-text{color:#e8e8e8}
  .grammar-examples-block{background:#0f1419}
  .grammar-example{color:#e8e8e8}
  .grammar-topic{color:#8a8a8a}
  .gender-der{background:#1e3a5f;color:#93c5fd}
  .gender-die{background:#5a1e3a;color:#fbcfe8}
  .gender-das{background:#1e4a30;color:#86efac}
  .dot-progress .dot{background:#3a3f48}
  .dot-progress .dot.done{background:#e8e8e8}
}
.level-chip{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;background:#f3f4f6;color:#374151;letter-spacing:0.5px}
.level-chip.chip-cases{background:#fef3c7;color:#92400e}
.grammar-filter-row{display:flex;gap:6px;margin-bottom:16px}
.grammar-filter-row button{margin-bottom:0;padding:10px;font-size:14px;flex:1}
.case-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:15px;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e5e7eb}
.case-table th,.case-table td{padding:10px 12px;text-align:left;border-bottom:1px solid #e5e7eb}
.case-table tr:last-child td{border-bottom:none}
.case-table th{background:#f9fafb;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:#374151}
.case-table td:first-child{font-weight:600;color:#111827}
.case-table-label{font-weight:700;font-size:14px;color:#374151;margin-top:14px;margin-bottom:-4px}
.grammar-card{cursor:pointer;display:flex;flex-direction:column;gap:6px}
.grammar-card-head{display:flex;justify-content:space-between;align-items:center;gap:8px}
.grammar-rule-card{text-align:left;padding:24px}
.grammar-topic{font-size:13px;font-weight:700;color:#6b7280;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px}
.grammar-rule-text{font-size:18px;line-height:1.5;color:#111827;margin-bottom:16px}
.grammar-examples-block{background:#f9fafb;border-radius:10px;border-left:3px solid #3b82f6;padding:12px 16px;margin-top:8px}
.grammar-example{font-size:16px;color:#111827;padding:6px 0;font-weight:500}
.grammar-example:not(:last-child){border-bottom:1px solid #e5e7eb}
.grammar-section-progress{font-size:13px;color:#6b7280}
.dot-progress{display:flex;gap:4px;align-items:center}
.dot-progress .dot{width:6px;height:6px;border-radius:999px;background:#d1d5db}
.dot-progress .dot.done{background:#111827}
</style>
</head>

// Grammar cheat sheets
const GRAMMAR = [
{level:"A1",category:"speaking_rules",title:"1. Speaking basics",items:[
  {topic:"du_vs_Sie",rule:"Use 'du' for informal situations and 'Sie' for formal situations.",examples:["Wie heißt du?","Wie heißen Sie?"]},
  {topic:"introductions",rule:"Use simple chunks to introduce yourself.",examples:["Ich heiße Omar.","Ich komme aus Berlin.","Ich wohne in Berlin.","Ich spreche Deutsch und Englisch."]},
  {topic:"greetings",rule:"Use time-based greetings and standard farewells.",examples:["Guten Morgen","Guten Tag","Guten Abend","Tschüs","Auf Wiedersehen","Gute Nacht"]},
  {topic:"how_are_you",rule:"Ask 'How are you?' differently in informal and formal speech.",examples:["Wie geht's dir?","Wie geht es Ihnen?"]}
]},
{level:"A1",category:"word_order",title:"2. Sentence rules",items:[
  {topic:"statement",rule:"In a main statement, the conjugated verb is usually in position 2.",examples:["Ich wohne in Berlin."]},
  {topic:"w_question",rule:"In a W-question, the question word comes first and the conjugated verb comes next.",examples:["Wo wohnst du?","Was machst du?"]},
  {topic:"yes_no_question",rule:"In a yes/no question, the conjugated verb comes first.",examples:["Kommst du aus Deutschland?","Hast du Zeit?"]},
  {topic:"time_first",rule:"A time expression can come first, but the conjugated verb still stays in position 2.",examples:["Am Abend lerne ich Deutsch."]}
]},
{level:"A1",category:"grammar",title:"3. Pronouns, verbs & nouns",items:[
  {topic:"personal_pronouns",rule:"Learn the main subject pronouns.",examples:["ich","du","er","sie","es","wir","ihr","sie","Sie"]},
  {topic:"present_tense",rule:"Conjugate common verbs in the present tense.",examples:["ich bin","du bist","er ist","ich habe","wir kommen"]},
  {topic:"noun_gender",rule:"German nouns have gender and should be learned with their article.",examples:["der Tisch","das Buch","die Lampe"]},
  {topic:"negation_nicht",rule:"Use 'nicht' to negate verbs, adjectives, or whole statements.",examples:["Ich komme nicht heute.","Das ist nicht gut."]},
  {topic:"negation_kein",rule:"Use 'kein' to negate nouns with indefinite meaning.",examples:["Ich habe kein Auto.","Wir kaufen keine Milch."]}
]},
{level:"A1",category:"cases_articles",title:"4. Cases & articles (intro)",items:[
  {topic:"nominative",rule:"Use nominative for the subject of the sentence.",examples:["Der Mann ist hier."]},
  {topic:"accusative",rule:"Use accusative for the direct object.",examples:["Ich sehe den Mann."]},
  {topic:"dative_basics",rule:"Use dative after common dative prepositions and for indirect objects.",examples:["Ich fahre mit dem Bus.","Ich gebe dem Kind das Buch."]},
  {topic:"nominative_articles",rule:"Nominative definite articles are der, das, die, die.",examples:["der Kaffee","das Brot","die Tasche"]},
  {topic:"accusative_masculine",rule:"Masculine articles change in the accusative.",examples:["der Mann -> den Mann","ein Mann -> einen Mann"]},
  {topic:"dative_articles",rule:"Dative articles are dem, dem, der, den; plural nouns often add -n.",examples:["mit dem Auto","bei der Arbeit","mit den Kindern"]}
]},
{level:"A1",category:"verbs",title:"5. Modal & separable verbs",items:[
  {topic:"modal_verbs_list",rule:"German has 6 modal verbs. They express ability, necessity, permission, etc. Memorize them with their core meaning. (möchten is the polite Konjunktiv II form of mögen and is treated as a 7th in practice.)",examples:["können — can / to be able to (ability, possibility)","müssen — must / to have to (necessity, obligation)","dürfen — may / to be allowed to (permission)","sollen — should / supposed to (external obligation)","wollen — to want (intention, strong desire)","mögen — to like (preference)","möchten — would like (polite wish, derived from mögen)"]},
  {topic:"modal_verbs",rule:"How to use modal verbs in a sentence: the MODAL is conjugated (in position 2 in a main clause) and the MAIN VERB goes to the END in infinitive form.",examples:["Ich will Deutsch lernen. — I want to learn German.","Wir können heute kommen. — We can come today.","Du musst jetzt schlafen. — You have to sleep now.","Darf ich rein? — May I come in?"]},
  {topic:"separable_verbs",rule:"Separable verbs have a prefix that splits off and moves to the END of the main clause. The prefix carries meaning — 'anrufen' (to call) is different from 'rufen' (to shout). Common prefixes: an-, auf-, aus-, ein-, mit-, vor-, weg-, zu-, ab-.",examples:["anrufen → Ich rufe dich an. (I call you)","aufstehen → Sie steht um 7 Uhr auf. (She gets up at 7)","einkaufen → Wir kaufen heute ein. (We go shopping today)","fernsehen → Er sieht jeden Abend fern. (He watches TV every evening)","mitkommen → Komm doch mit! (Come along!)","abfahren → Der Zug fährt um 8 ab. (The train departs at 8)","ankommen → Wir kommen morgen an. (We arrive tomorrow)","aufmachen → Mach die Tür auf. (Open the door)","zumachen → Bitte mach das Fenster zu. (Please close the window)","weggehen → Ich gehe gleich weg. (I'm leaving in a moment)"]},
  {topic:"separable_with_modal",rule:"When you combine a modal verb with a separable verb, the separable verb stays TOGETHER as one infinitive at the end. The prefix does NOT separate.",examples:["Ich kann dich anrufen. — I can call you.","Wir wollen heute einkaufen. — We want to go shopping today.","Er muss früh aufstehen. — He has to get up early.","Darfst du mitkommen? — Are you allowed to come along?","Sie soll das Fenster aufmachen. — She's supposed to open the window.","Möchtest du fernsehen? — Would you like to watch TV?"]},
  {topic:"imperative",rule:"Use the imperative for commands and requests.",examples:["Komm!","Helfen Sie mir bitte!","Mach die Tür zu!"]}
]},
{level:"A1",category:"prepositions_time",title:"6. Prepositions & time",items:[
  {topic:"dative_prepositions",rule:"Common dative prepositions are aus, bei, mit, nach, seit, von, zu.",examples:["Ich komme aus der Türkei.","Ich fahre mit dem Bus."]},
  {topic:"accusative_prepositions",rule:"Common accusative prepositions include für and ohne.",examples:["Das Geschenk ist für dich.","Ich gehe ohne Jacke."]},
  {topic:"time_phrases",rule:"Use am for days, im for months/seasons, and um for clock times.",examples:["am Montag","im April","um 8 Uhr","von 8 bis 16 Uhr"]},
  {topic:"sequence_words",rule:"Use sequence words to speak about routines or instructions.",examples:["zuerst — first","dann — then","danach — after that","später — later","zuletzt — finally / at last"]}
]},
{level:"A1",category:"pronouns_possession",title:"7. Pronouns & possession",items:[
  {topic:"possessive_articles",rule:"Use possessive articles to show ownership.",examples:["mein Buch","deine Tasche","unser Auto","Ihr Name"]},
  {topic:"accusative_pronouns",rule:"Accusative pronouns replace direct objects (the WHAT/WHOM being acted on).",examples:["mich — me","dich — you (informal singular)","ihn — him","sie — her","es — it","uns — us","euch — you (informal plural)","sie — them","Sie — you (formal)"]},
  {topic:"dative_pronouns",rule:"Dative pronouns replace indirect objects (TO WHOM / FOR WHOM).",examples:["mir — to / for me","dir — to / for you (informal singular)","ihm — to / for him / it","ihr — to / for her","uns — to / for us","euch — to / for you (informal plural)","ihnen — to / for them","Ihnen — to / for you (formal)"]},
  {topic:"simple_possession",rule:"Possession can be shown with a name plus -s or with 'von'.",examples:["Marias Handy","die Tasche von Ali"]}
]},
{level:"A1",category:"past_tense",title:"8. Past tense basics",items:[
  {topic:"prateritum_basics",rule:"At beginner level, simple past often appears first with 'sein' and 'haben'.",examples:["Ich war müde.","Ich hatte Stress."]},
  {topic:"perfekt",rule:"Use haben/sein plus Partizip II to talk about completed past actions.",examples:["Ich habe gearbeitet.","Er ist gefahren."]},
  {topic:"sein_verbs",rule:"Many movement verbs use 'sein' in Perfekt.",examples:["Ich bin gegangen.","Wir sind gekommen."]}
]},
{level:"A2",category:"case_control",title:"1. Sharper case control",items:[
  {topic:"case_control",rule:"At A2 you should handle Nominativ, Akkusativ, and Dativ confidently in longer sentences with multiple objects.",examples:["Ich gebe dem Mann das Buch.","Sie zeigt der Frau die Karte.","Er erklärt dem Kind die Aufgabe."]}
]},
{level:"A2",category:"adjective_endings",title:"2. Adjective endings",items:[
  {topic:"adjective_endings",rule:"Adjective endings start to matter — they change with the article and the case. Two main patterns at A2: after a definite article (der/die/das), and after an indefinite article (ein/eine).",examples:["das kleine Kind (after definite article)","ein kleines Kind (after indefinite article)","mit dem kleinen Kind (Dativ)"]}
]},
{level:"A2",category:"reflexive_verbs",title:"3. Reflexive verbs",items:[
  {topic:"reflexive_verbs",rule:"Reflexive verbs use a pronoun (mich/dich/sich/uns/euch) that refers back to the subject. Very common at A2: sich freuen, sich treffen, sich fühlen, sich interessieren.",examples:["Ich freue mich.","Wir treffen uns um acht.","Sie interessiert sich für Musik."]}
]},
{level:"A2",category:"comparisons",title:"4. Comparisons",items:[
  {topic:"comparisons",rule:"Comparative: add -er (größer, besser). Superlative: am + -sten OR der/die/das + -ste. Use 'als' for than, 'so ... wie' for equal comparisons.",examples:["Berlin ist größer als Bonn.","Das ist besser.","Sie ist so groß wie ich."]}
]},
{level:"A2",category:"tenses_polite",title:"5. Confident tenses & polite requests",items:[
  {topic:"tenses",rule:"At A2, you should use Perfekt confidently for past events and Präteritum for common verbs (sein, haben, modals).",examples:["Ich habe gestern gelernt.","Früher war ich in Köln.","Wir mussten warten."]},
  {topic:"polite_requests",rule:"Polite request forms appear at A2 — 'könnte' (Konjunktiv II of können) and 'hätte gern' (would like).",examples:["Könnte ich bitte zahlen?","Ich hätte gern einen Kaffee.","Könnten Sie mir helfen?"]}
]},
{level:"A2",category:"subordinate_clauses",title:"6. Subordinate clauses",items:[
  {topic:"weil",rule:"Use 'weil' to give a reason. The conjugated verb goes to the END of the subordinate clause.",examples:["Ich lerne Deutsch, weil ich in Berlin wohne."]},
  {topic:"dass",rule:"Use 'dass' to introduce a subordinate clause with a statement or opinion. Verb goes to the end.",examples:["Ich glaube, dass er heute kommt."]},
  {topic:"wenn",rule:"Use 'wenn' for repeated conditions or future conditions; verb goes to the end.",examples:["Wenn ich Zeit habe, komme ich."]},
  {topic:"als",rule:"Use 'als' for a SINGLE event in the past (different from 'wenn' which is for repeated events).",examples:["Als ich klein war, wohnte ich in Ankara."]}
]},
{level:"A1-A2",category:"learning_tips",title:"9. How to study at A1",items:[
  {topic:"learn_articles",rule:"Always learn nouns together with their article.",examples:["der Tisch","das Buch","die Lampe"]},
  {topic:"learn_chunks",rule:"Learn verbs and speaking phrases as chunks, not in isolation.",examples:["Ich komme aus ...","Ich möchte ... bestellen.","Kannst du ...?"]},
  {topic:"speaking_priority",rule:"For beginner speaking, focus first on greetings, introductions, daily routines, asking questions, shopping, invitations, and simple past events.",examples:["Wo ist ...?","Wann beginnt ...?","Ich habe gestern gearbeitet."]}
]},
{level:"B1",category:"speaking_rules",title:"1. Speaking at B1",items:[
  {topic:"expressing_opinions",rule:"At B1, learners should express opinions, reasons, agreement, and disagreement more clearly.",examples:["Ich denke, dass das eine gute Idee ist.","Meiner Meinung nach ist das wichtig.","Ich bin damit einverstanden.","Ich sehe das anders."]},
  {topic:"giving_reasons",rule:"Use connectors to explain causes, consequences, and contrasts in spoken German.",examples:["Ich lerne Deutsch, weil ich in Deutschland arbeite.","Es ist teuer, aber sehr praktisch.","Deshalb fahre ich mit der Bahn."]},
  {topic:"making_suggestions",rule:"Use softer and more natural phrasing for suggestions, requests, and advice.",examples:["Wir könnten am Wochenende ins Kino gehen.","Du solltest früher schlafen.","An deiner Stelle würde ich das machen."]},
  {topic:"narrating_events",rule:"At B1, you should be able to describe experiences, plans, goals, and past events in more detail.",examples:["Letztes Jahr bin ich nach Hamburg gefahren und habe dort Freunde besucht.","In Zukunft möchte ich besser Deutsch sprechen."]}
]},
{level:"B1",category:"sentence_structure",title:"2. Sentence structure",items:[
  {topic:"main_clause",rule:"In a main clause, the conjugated verb stays in position 2.",examples:["Heute gehe ich früher nach Hause."]},
  {topic:"subordinate_clause",rule:"In subordinate clauses, the conjugated verb goes to the end.",examples:["Ich bleibe zu Hause, weil ich krank bin.","Er sagt, dass er heute keine Zeit hat."]},
  {topic:"two_part_connectors",rule:"B1 increasingly uses paired connectors to link two ideas.",examples:["sowohl ... als auch — Er spricht sowohl Deutsch als auch Englisch.","entweder ... oder — Entweder du kommst, oder du bleibst.","weder ... noch — Ich habe weder Zeit noch Geld.","nicht nur ... sondern auch — Sie ist nicht nur klug, sondern auch nett.","zwar ... aber — Es ist zwar teuer, aber sehr gut."]},
  {topic:"inversion",rule:"When an element other than the subject (time, place, adverb) comes first, the subject moves AFTER the verb.",examples:["Deshalb gehe ich früher.","Morgen fahre ich nach Leipzig."]}
]},
{level:"B1",category:"connectors_causal",title:"3. Causal connectors",items:[
  {topic:"subordinator_causal",rule:"Subordinators (weil, da) push the verb to the END of their clause.",examples:["Ich bleibe zu Hause, weil ich krank bin.","Da es regnet, nehmen wir den Bus."]},
  {topic:"coordinator_causal",rule:"The coordinator 'denn' does NOT change word order — both clauses stay normal.",examples:["Ich bleibe zu Hause, denn ich bin krank."]},
  {topic:"adverbial_causal",rule:"Adverbials (deshalb, deswegen, darum) cause INVERSION — verb comes before subject.",examples:["Ich bin krank. Deshalb bleibe ich zu Hause.","Es regnet, deswegen nehme ich den Bus."]}
]},
{level:"B1",category:"connectors_contrast_time",title:"4. Contrast & time connectors",items:[
  {topic:"subordinator_contrast",rule:"Subordinators of contrast (obwohl, während) push the verb to the END.",examples:["Ich gehe joggen, obwohl es regnet.","Während er kocht, lese ich."]},
  {topic:"coordinator_contrast",rule:"'aber' is a coordinator — it keeps normal word order.",examples:["Es ist kalt, aber ich gehe spazieren."]},
  {topic:"adverbial_contrast",rule:"'trotzdem' is an adverb — it causes inversion just like deshalb.",examples:["Es regnet. Trotzdem gehe ich raus."]},
  {topic:"time_subordinators",rule:"Time subordinators (bevor, nachdem, als, wenn, sobald, während) push the verb to the end. 'als' = single past event; 'wenn' = repeated or future.",examples:["Bevor ich gehe, mache ich Kaffee.","Als ich klein war, wohnte ich in Köln.","Wenn ich Zeit habe, lese ich."]},
  {topic:"purpose_connectors",rule:"Use 'damit' when subjects of the two clauses differ; 'um ... zu' when the subject is the same.",examples:["Ich lerne viel, damit ich die Prüfung bestehe.","Ich gehe zur Bank, um Geld abzuheben."]}
]},
{level:"B1",category:"tenses",title:"5. Tenses",items:[
  {topic:"perfekt",rule:"Perfekt remains the most common spoken past tense. Use 'haben' or 'sein' as auxiliary.",examples:["Ich habe gestern lange gearbeitet.","Wir sind spät angekommen."]},
  {topic:"prateritum_common_verbs",rule:"Präteritum is preferred in writing and with common verbs (sein, haben, modals) in speech.",examples:["Ich war müde.","Er hatte keine Zeit.","Wir mussten warten."]},
  {topic:"plusquamperfekt",rule:"Use Plusquamperfekt for an action that happened BEFORE another past action. Often paired with 'nachdem'.",examples:["Nachdem ich gegessen hatte, bin ich spazieren gegangen."]},
  {topic:"futur_1",rule:"Futur I is used for future plans, predictions, or assumptions about the present.",examples:["Ich werde morgen früher kommen.","Er wird jetzt wohl zu Hause sein."]}
]},
{level:"B1",category:"relative_clauses",title:"6. Relative clauses",items:[
  {topic:"relative_nominative",rule:"Relative pronouns (der/die/das) match the GENDER of the noun and the CASE they have in the clause.",examples:["Das ist der Mann, der nebenan wohnt."]},
  {topic:"relative_accusative",rule:"When the pronoun is the direct object of the relative clause, use accusative.",examples:["Das ist der Film, den ich gestern gesehen habe."]},
  {topic:"relative_dative",rule:"When the pronoun is the indirect object or follows a dative-taking verb, use dative.",examples:["Das ist die Frau, der ich geholfen habe."]},
  {topic:"relative_with_preposition",rule:"The preposition sits right before the relative pronoun and determines its case.",examples:["Das ist der Kollege, mit dem ich arbeite."]}
]},
{level:"B1",category:"passive",title:"7. Passive voice",items:[
  {topic:"passive_present",rule:"Vorgangspassiv (action passive): werden + Partizip II. Focuses on the action, not the doer.",examples:["Das Auto wird repariert."]},
  {topic:"passive_past",rule:"For past passive, use 'wurde' (Präteritum) + Partizip II.",examples:["Die Straße wurde gesperrt."]},
  {topic:"state_passive",rule:"Zustandspassiv (state passive): sein + Partizip II. Describes the resulting state, not the action.",examples:["Die Tür ist geschlossen."]}
]},
{level:"B1",category:"konjunktiv_ii",title:"8. Konjunktiv II",items:[
  {topic:"polite_requests",rule:"Use Konjunktiv II for polite requests. 'könnten' and 'hätte gern' are the most common.",examples:["Könnten Sie mir helfen?","Ich hätte gern einen Tee."]},
  {topic:"hypothetical_situations",rule:"For unreal or hypothetical situations use 'wenn ... hätte/wäre, würde ...'.",examples:["Wenn ich mehr Zeit hätte, würde ich öfter reisen."]},
  {topic:"wurde_form",rule:"For most verbs, 'würde + infinitive' replaces the proper Konjunktiv II in spoken German.",examples:["Ich würde gern in Deutschland studieren."]},
  {topic:"wishes",rule:"Use Konjunktiv II to express wishes and unreal desires.",examples:["Ich wünschte, ich hätte mehr Urlaub."]}
]},
{level:"B1",category:"infinitive_constructions",title:"9. Infinitive constructions",items:[
  {topic:"um_zu",rule:"Use 'um ... zu' when the subject of both parts is the SAME. Expresses purpose.",examples:["Ich lerne viel, um die Prüfung zu bestehen."]},
  {topic:"ohne_zu",rule:"Use 'ohne ... zu' to express 'without doing something'.",examples:["Er ist gegangen, ohne etwas zu sagen."]},
  {topic:"anstatt_zu",rule:"Use 'anstatt ... zu' to express 'instead of doing something'.",examples:["Sie bleibt zu Hause, anstatt zur Party zu gehen."]},
  {topic:"brauchen_nicht_zu",rule:"'nicht brauchen + zu + Infinitiv' means something is not necessary. The 'zu' is sometimes dropped in speech.",examples:["Du brauchst morgen nicht zu kommen."]}
]},
{level:"B1",category:"cases_and_prepositions",title:"10. Cases & prepositions",items:[
  {topic:"genitive",rule:"Genitive shows possession or specification. Common in writing.",examples:["die Farbe des Autos","während des Urlaubs"]},
  {topic:"genitive_prepositions",rule:"wegen, während, trotz take genitive in formal/written German. In casual spoken German they are often used with dative ('wegen dem Wetter'). On the B1 exam, use genitive.",examples:["wegen des Wetters","während des Urlaubs","trotz des Regens"]},
  {topic:"two_way_prepositions",rule:"Wechselpräpositionen (in, auf, an, unter, über, vor, hinter, neben, zwischen): accusative for DIRECTION (wohin?), dative for LOCATION (wo?).",examples:["Ich gehe in die Stadt. (direction → Akk)","Ich bin in der Stadt. (location → Dat)"]},
  {topic:"verbs_with_prepositions",rule:"Many verbs are fixed with a specific preposition + case. Learn them together as a unit.",examples:["warten auf + Akkusativ","sich interessieren für + Akkusativ","teilnehmen an + Dativ","denken an + Akkusativ"]}
]},
{level:"B1",category:"adjectives_nouns",title:"11. Adjectives & noun forms",items:[
  {topic:"adjective_endings",rule:"Endings depend on the article: weak (after der/die/das), mixed (after ein/kein/mein), strong (no article).",examples:["der kleine Hund (weak)","ein kleiner Hund (mixed)","frisches Brot (strong)"]},
  {topic:"comparative_superlative",rule:"Comparative: stem + -er. Superlative: am + -sten OR der/die/das + -ste.",examples:["größer","interessanter","am besten","der schönste Park"]},
  {topic:"nominalization",rule:"Adjectives and verbs can become nouns. Capitalize them; they take a gendered article.",examples:["das Essen","beim Lesen","der Alte"]},
  {topic:"weak_nouns_n_deklination",rule:"Some masculine nouns (Student, Junge, Mensch, Herr) take -n or -en in ALL cases except nominative singular.",examples:["der Student (Nom)","des Studenten (Gen)","dem Studenten (Dat)","den Studenten (Akk)"]}
]},
{level:"B1",category:"special_verbs_patterns",title:"12. Special verb patterns",items:[
  {topic:"reflexive_verbs",rule:"Reflexive verbs use 'sich' and often pair with a fixed preposition.",examples:["Ich interessiere mich für Musik.","Er erinnert sich an das Gespräch."]},
  {topic:"lassen",rule:"'lassen' has two main B1 uses: (1) have something done by someone else, (2) allow / let.",examples:["Ich lasse mein Handy reparieren. (have it repaired)","Lass mich bitte ausreden. (let me finish)"]},
  {topic:"da_compounds",rule:"da + preposition refers back to a THING/IDEA (not a person). Use 'darauf', 'dafür', 'daran', etc.",examples:["Ich interessiere mich dafür.","Daran kann ich mich nicht erinnern."]},
  {topic:"wo_compounds",rule:"wo + preposition asks about a THING/IDEA. For people use 'mit wem', 'für wen', etc.",examples:["Worauf wartest du?","Womit fährst du zur Arbeit?"]}
]},
{level:"B1",category:"writing_speaking_functions",title:"13. Communication functions",items:[
  {topic:"formal_messages",rule:"For semi-formal/formal messages: open with 'Sehr geehrte/r ...', use 'Sie', close with 'Mit freundlichen Grüßen'.",examples:["Ich schreibe Ihnen, weil ...","Vielen Dank für Ihre Nachricht.","Mit freundlichen Grüßen"]},
  {topic:"giving_advice",rule:"Use 'sollte' for advice or 'würde + empfehlen' for softer suggestions.",examples:["Du solltest mehr schlafen.","Ich würde dir empfehlen, früher anzufangen."]},
  {topic:"describing_problems",rule:"State the problem with enough detail to get help or make a complaint.",examples:["Ich habe ein Problem mit meiner Heizung.","Das Paket ist noch nicht angekommen."]},
  {topic:"arguing_structurally",rule:"Structure your argument: opinion → reason → example → conclusion.",examples:["Ich finde das wichtig, weil ...","Ein gutes Beispiel dafür ist ...","Deshalb bin ich dafür."]}
]},
{level:"B1",category:"learning_tips",title:"14. How to study at B1",items:[
  {topic:"learn_with_patterns",rule:"Learn B1 grammar as sentence patterns, not isolated rules.",examples:["Ich denke, dass ...","Wenn ich Zeit hätte, würde ich ...","Das ist etwas, das ..."]},
  {topic:"focus_on_connectors",rule:"B1 improves a lot when you master connectors AND their word-order behavior.",examples:["weil (verb at end)","obwohl (verb at end)","deshalb (inversion)","trotzdem (inversion)","damit (verb at end)"]},
  {topic:"active_output",rule:"Practice speaking and writing with longer answers instead of single sentences.",examples:["Erzähle von einem Erlebnis.","Beschreibe ein Problem und eine Lösung.","Gib deine Meinung mit Gründen."]}
]},
{level:"Cases",category:"why_cases",title:"1. Why cases exist",items:[
  {topic:"why_cases",rule:"English marks who-does-what with WORD ORDER. German marks it with CASES — the article changes shape based on the noun's role in the sentence. That's why German word order can be more flexible: the case tells you who's doing what to whom.",examples:["English: 'The dog bites the man' ≠ 'The man bites the dog' — word order decides the meaning.","German: 'Der Hund beißt den Mann' = 'Den Mann beißt der Hund' — same meaning either way.","The case marker (der vs den) tells you who bites whom — not the order."]}
]},
{level:"Cases",category:"three_roles",title:"2. The three roles",items:[
  {topic:"anchor_sentence",rule:"Memorize this single sentence — it contains all three cases. We'll return to it throughout: 'Der Mann gibt dem Kind den Ball.' (The man gives the child the ball.) Each noun in this sentence plays a different role.",examples:["Der Mann → Nominativ (the actor: who gives)","den Ball → Akkusativ (what is given)","dem Kind → Dativ (to whom it's given)"]},
  {topic:"role_nominativ",rule:"Nominativ marks the SUBJECT — the actor doing the action. Every German sentence has exactly one Nominativ.",examples:["Anchor: Der Mann gibt dem Kind den Ball. → 'Der Mann' is in Nom: he does the giving.","Der Hund schläft.","Die Lehrerin arbeitet.","Das Kind spielt."]},
  {topic:"role_akkusativ",rule:"Akkusativ marks the DIRECT OBJECT — the thing or person the action is done to.",examples:["Anchor: Der Mann gibt dem Kind den Ball. → 'den Ball' is in Akk: the ball is what's given.","Ich sehe den Mann.","Sie kauft das Buch.","Er besucht die Frau."]},
  {topic:"role_dativ",rule:"Dativ marks the INDIRECT OBJECT — usually the recipient or person affected. (Dativ is ALSO triggered by certain prepositions and verbs — covered in section 4.)",examples:["Anchor: Der Mann gibt dem Kind den Ball. → 'dem Kind' is in Dat: the child receives.","Ich gebe dem Hund Wasser.","Sie hilft der Lehrerin.","Wir danken den Kindern."]}
]},
{level:"Cases",category:"article_forms",title:"3. The article forms",items:[
  {topic:"definite_articles",rule:"Now that you know the roles, here are the article forms. Two key observations: Akkusativ only changes the MASCULINE article (der → den). Dativ changes EVERY form.",table:{
    headers:["Case","Masculine","Neuter","Feminine","Plural"],
    rows:[
      ["Nominativ","der","das","die","die"],
      ["Akkusativ","den","das","die","die"],
      ["Dativ","dem","dem","der","den"]
    ]
  }},
  {topic:"indefinite_articles",rule:"Indefinite articles follow the SAME pattern as definite ones. There is NO plural indefinite article in German — you simply drop the article in the plural.",table:{
    headers:["Case","Masculine","Neuter","Feminine"],
    rows:[
      ["Nominativ","ein","ein","eine"],
      ["Akkusativ","einen","ein","eine"],
      ["Dativ","einem","einem","einer"]
    ]
  }}
]},
{level:"Cases",category:"forced_cases",title:"4. When rules override the role",items:[
  {topic:"dativ_prepositions",rule:"Some prepositions ALWAYS take Dativ — regardless of what role the noun would otherwise play. Memorize as a group: aus, bei, mit, nach, seit, von, zu. Even if the noun looks like a direct object, the preposition wins.",examples:["Ich fahre mit dem Bus. (not 'den Bus' — 'mit' forces Dat)","Sie kommt aus der Türkei.","Wir gehen zu dem Markt. (→ 'zum Markt')","Ich wohne bei meiner Schwester."]},
  {topic:"akkusativ_prepositions",rule:"These prepositions ALWAYS take Akkusativ: durch, für, gegen, ohne, um. Same logic — the preposition decides the case, not the noun's role.",examples:["Das Geschenk ist für dich.","Ich gehe ohne meine Jacke.","Wir laufen durch den Park.","Er fährt gegen den Baum."]},
  {topic:"two_way_prepositions",rule:"Two-way prepositions (Wechselpräpositionen) can take EITHER case. The rule: ACCUSATIVE for direction (wohin? = where to?), DATIVE for location (wo? = where?). Memorize the 9: an, auf, hinter, in, neben, über, unter, vor, zwischen.",examples:["Ich gehe in die Stadt. (movement → Akk: wohin?)","Ich bin in der Stadt. (location → Dat: wo?)","Er stellt das Buch auf den Tisch. (movement → Akk)","Das Buch liegt auf dem Tisch. (location → Dat)"]}
]},
{level:"Cases",category:"quick_reference",title:"5. Quick reference",items:[
  {topic:"anchor_decomposition",rule:"Your mental anchor for the three cases. Whenever you're stuck, return to this sentence. It's the fastest way to retest your understanding.",examples:["Der Mann gibt dem Kind den Ball.","→ Der Mann (Nominativ — the actor / who gives)","→ den Ball (Akkusativ — the direct object / what is given)","→ dem Kind (Dativ — the indirect object / to whom)","────────","ALWAYS Dativ: aus · bei · mit · nach · seit · von · zu","ALWAYS Akkusativ: durch · für · gegen · ohne · um","TWO-WAY (wohin? → Akk, wo? → Dat): an · auf · hinter · in · neben · über · unter · vor · zwischen"]}
]}
];

function formatTopic(s) { return s.replace(/_/g, " ").replace(/^./, function(c){ return c.toUpperCase(); }); }

// Storage

const GRAMMAR_KEY = "GERMAN_GRAMMAR_PROGRESS_V1";

function loadGrammarProgress(){ try { return JSON.parse(localStorage.getItem(GRAMMAR_KEY) || "{}"); } catch(e) { return {}; } }

// Audio (German TTS via browser SpeechSynthesis API)
function speak(text, lang) {
  if (!('speechSynthesis' in window)) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang || 'de-DE';
    u.rate = 0.9;
    speechSynthesis.speak(u);
  } catch (e) { /* ignore */ }
}
function speakCurrent() {
  if (!state.session || !state.session.queue.length) return;
  const cardId = state.session.queue[0];
  const card = CARDS.find(function(c){ return c.id === cardId; });
  if (!card) return;
  let text = card.german;
  let exDe = null;
  if (card.type === 'noun' && card.nom) exDe = card.nom.de;
  else if (card.example) exDe = card.example.de;
  else if (card.exampleSentenceGerman) exDe = card.exampleSentenceGerman;
  if (exDe) text = text + '. ' + exDe;
  speak(text, 'de-DE');
}

// Touch gestures (swipe right = next/good, swipe left = repeat/again)
let _touchStartX = null;
let _touchStartY = null;
function touchStart(e) {
  if (e.touches && e.touches[0]) {
    _touchStartX = e.touches[0].clientX;
    _touchStartY = e.touches[0].clientY;
  }
}
function touchEnd(e) {
  if (_touchStartX === null) return;
  const endX = e.changedTouches[0].clientX;
  const endY = e.changedTouches[0].clientY;
  const dx = endX - _touchStartX;
  const dy = endY - _touchStartY;
  _touchStartX = null;
  _touchStartY = null;
  if (!state.session || !state.session.revealed) return;
  // Horizontal swipe must be larger than vertical and exceed threshold
  if (Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0) rate('good');
    else rate('again');
  }
}

// Daily streak — call when user completes any review
function updateStreakOnStudy() {
  const today = new Date().toISOString().slice(0, 10);
  const last = state.streak.lastStudyDate;
  if (last === today) return; // already counted today
  if (!last) {
    state.streak.count = 1;
  } else {
    const lastDate = new Date(last);
    const todayDate = new Date(today);
    const diff = Math.round((todayDate - lastDate) / 86400000);
    if (diff === 1) state.streak.count += 1;
    else if (diff > 1) state.streak.count = 1;
  }
  state.streak.lastStudyDate = today;
  saveStreak();
}
function saveProgress(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress)); }

// Scheduler
const MS_PER_DAY = 86400000, DEFAULT_EASE = 2.5, MIN_EASE = 1.3;
function applyRating(prev, rating, cardId, now) {
  now = now || Date.now();
  const base = prev || { cardId, easeFactor:DEFAULT_EASE, interval:0, repetitions:0, lastReviewedAt:0, nextReviewAt:now };
  let ef = base.easeFactor, iv = base.interval, rp = base.repetitions;
  if (rating === "again") return { cardId, easeFactor:Math.max(MIN_EASE, ef-0.2), interval:0, repetitions:0, lastReviewedAt:now, nextReviewAt:now + 600000 };
  if (rating === "hard") { ef = Math.max(MIN_EASE, ef-0.15); iv = iv===0 ? 1 : Math.max(1, Math.round(iv*1.2)); rp++; }
  else if (rating === "good") { iv = iv===0 ? 1 : Math.round(iv*ef); rp++; }
  else if (rating === "easy") { ef += 0.15; iv = iv===0 ? 3 : Math.round(iv*ef*1.3); rp++; }
  return { cardId, easeFactor:ef, interval:iv, repetitions:rp, lastReviewedAt:now, nextReviewAt:now + iv*MS_PER_DAY };
}
function getStatus(p) { if (!p || p.repetitions === 0) return "new"; if (p.interval < 7) return "learning"; return "learned"; }
function dueScore(p, now) { if (!p) return 1; const d = p.nextReviewAt - now; return d <= 0 ? -1000000 + d : d; }
function shuffle(arr) { const a = arr.slice(); for (let i=a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]] = [a[j],a[i]]; } return a; }

function levelStats(level) {
  const cards = CARDS.filter(function(c){ return c.level === level; });
  let reviewed=0, n=0, learning=0, learned=0;
  for (const c of cards) {
    const p = state.progress[c.id]; const s = getStatus(p);
    if (p && p.repetitions > 0) reviewed++;
    if (s === "new") n++; else if (s === "learning") learning++; else learned++;
  }
  return { total:cards.length, reviewed, new:n, learning, learned };
}

// State
const state = {
  screen: "home",
  selectedLevels: { A1:true, A2:false, B1:false },
  sessionSize: 20,
  session: null,
  progress: loadProgress(),
  grammarSectionIdx: 0,
  grammarItemIdx: 0,
  grammarFilter: "A1",
  grammarProgress: loadGrammarProgress(),
  streak: loadStreak()
};

// Actions
function go(s) { state.screen = s; render(); }
function toggleLevel(l) { state.selectedLevels[l] = !state.selectedLevels[l]; render(); }
function selectAllLevels() { state.selectedLevels = { A1:true, A2:true, B1:true }; render(); }
function setSessionSize(n) { state.sessionSize = n; render(); }

function openGrammar() { state.screen = "grammar"; render(); }
function setGrammarFilter(f) { state.grammarFilter = f; render(); }
function openGrammarSection(i) { state.grammarSectionIdx = i; state.grammarItemIdx = 0; state.screen = "grammar-section"; render(); }
function nextGrammarItem() {
  const section = GRAMMAR[state.grammarSectionIdx];
  state.grammarProgress[state.grammarSectionIdx + ":" + state.grammarItemIdx] = true;
  saveGrammarProgress();
  if (state.grammarItemIdx < section.items.length - 1) { state.grammarItemIdx++; render(); }
  else { state.screen = "grammar"; render(); }
}
function prevGrammarItem() { if (state.grammarItemIdx > 0) { state.grammarItemIdx--; render(); } }
function sectionSeenCount(idx) {
  const section = GRAMMAR[idx]; let c = 0;
  for (let i = 0; i < section.items.length; i++) if (state.grammarProgress[idx + ":" + i]) c++;
  return c;
}

function startSession() {
  const levels = Object.keys(state.selectedLevels).filter(function(l){ return state.selectedLevels[l]; });
  if (levels.length === 0) return;
  const now = Date.now();
  const cards = CARDS.filter(function(c){ return levels.indexOf(c.level) !== -1; });
  const shuffled = shuffle(cards);
  shuffled.sort(function(a,b){ return dueScore(state.progress[a.id], now) - dueScore(state.progress[b.id], now); });
  const limited = state.sessionSize === 0 ? shuffled : shuffled.slice(0, state.sessionSize);
  state.session = {
    queue: limited.map(function(c){ return c.id; }),
    revealed: false,
    metrics: { startTime: Date.now(), ratings: [] }
  };
  state.screen = "practice";
  render();
}

function reveal() { if (state.session) { state.session.revealed = true; render(); } }
function rate(rating) {
  if (!state.session || state.session.queue.length === 0) return;
  const cardId = state.session.queue[0];
  const wasNew = getStatus(state.progress[cardId]) === "new";
  state.progress[cardId] = applyRating(state.progress[cardId], rating, cardId);
  saveProgress();
  if (state.session.metrics) state.session.metrics.ratings.push({ cardId: cardId, rating: rating, wasNew: wasNew });
  updateStreakOnStudy();
  if (rating === "again") { state.session.queue.shift(); state.session.queue.push(cardId); }
  else state.session.queue.shift();
  state.session.revealed = false;
  // If session finished, show summary
  if (state.session.queue.length === 0) {
    state.screen = "summary";
  }
  render();
}
function skipCard() {
  if (!state.session || state.session.queue.length === 0) return;
  const id = state.session.queue.shift(); state.session.queue.push(id);
  state.session.revealed = false; render();
}
function endSession() { state.session = null; state.screen = "home"; render(); }
function resetProgress() {
  if (!confirm("Reset all progress? This can't be undone.")) return;
  state.progress = {}; localStorage.removeItem(STORAGE_KEY); render();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function(c) {
    return { "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c];
  });
}

// Screens
function renderHome() {
  const levels = ["A1","A2","B1"];
  const cards = levels.map(function(level) {
    const s = levelStats(level);
    const mastery = s.total === 0 ? 0 : Math.round((s.learned / s.total) * 100);
    return '<div class="card"><h2>'+level+'</h2><div class="muted">'+s.reviewed+' / '+s.total+' seen</div><div style="margin-top:4px;font-weight:600;">'+mastery+'% mastered</div></div>';
  }).join("");
  const streakBadge = state.streak.count > 0
    ? '<div class="streak-chip">🔥 '+state.streak.count+'-day streak</div>'
    : '';
  return streakBadge + '<h1>Lerne Deutsch</h1><p>Pick a level or combine several. Cards you struggle with come back sooner.</p><div class="grid-3">'+cards+'</div><button class="btn-primary" onclick="go(\'levels\')">Start practicing</button><button class="btn-secondary" onclick="openGrammar()">Grammar guide</button><button class="btn-subtle" onclick="go(\'progress\')">View detailed progress</button>';
}

function renderLevels() {
  const levels = ["A1","A2","B1"];
  const someSelected = Object.values(state.selectedLevels).some(function(v){return v;});
  const allSelected = Object.values(state.selectedLevels).every(function(v){return v;});
  const options = levels.map(function(level) {
    const active = state.selectedLevels[level];
    return '<div class="card level-option '+(active?"active":"")+'" onclick="toggleLevel(\''+level+'\')"><h2>'+level+'</h2><div class="state">'+(active?"Included":"Not included")+'</div></div>';
  }).join("");
  const sizes = [10, 20, 50, 0];
  const sizeButtons = sizes.map(function(n) {
    const label = n === 0 ? 'Total' : String(n);
    return '<button class="'+(state.sessionSize===n?"btn-primary active":"btn-secondary")+'" onclick="setSessionSize('+n+')">'+label+'</button>';
  }).join("");
  return '<h1>Choose levels</h1><p>Mix levels — the scheduler picks what is most useful now.</p>'+options+'<div class="size-label">Session size</div><div class="size-row">'+sizeButtons+'</div><button class="btn-'+(allSelected?"subtle":"secondary")+'" onclick="selectAllLevels()" '+(allSelected?"disabled":"")+'>'+(allSelected?"All levels selected":"Select all levels")+'</button><button class="btn-primary" onclick="startSession()" '+(!someSelected?"disabled":"")+'>Start session</button><button class="btn-secondary" onclick="go(\'home\')">Back</button>';
}

function toggleFlip() { if (state.session) { state.session.revealed = !state.session.revealed; render(); } }

function renderExample(label, ex, caseClass) {
  if (!ex) return '';
  return '<div class="example-block'+(caseClass?' '+caseClass:'')+'">'+
    (label ? '<div class="case-label">'+label+'</div>' : '')+
    '<div class="ex-de">'+escapeHtml(ex.de)+'</div>'+
    (ex.en ? '<div class="ex-en">'+escapeHtml(ex.en)+'</div>' : '')+
    '</div>';
}

function renderPractice() {
  if (!state.session || state.session.queue.length === 0) {
    return '<h1>Session complete!</h1><p>You went through all the cards. Come back later or start another session.</p><button class="btn-primary" onclick="endSession()">Back to Home</button>';
  }
  const cardId = state.session.queue[0];
  const card = CARDS.find(function(c){ return c.id === cardId; });
  const remaining = state.session.queue.length;

  const front = '<div class="header-row"><span class="muted">'+card.level+' · '+card.type+'</span><span class="muted">'+remaining+' left</span></div>';
  const isNoun = card.type === "noun";
  const genderBadge = isNoun && card.gender ? '<div class="gender-badge gender-'+card.gender+'">'+card.gender+'</div>' : '';
  const flipHint = '<div class="flip-hint">'+(state.session.revealed?'Tap to hide':'Tap to flip')+'</div>';

  // Find the primary example sentence (appears on front in German, on back with translation)
  let primaryEx = null;
  if (isNoun && card.nom) primaryEx = card.nom;
  else if (card.example) primaryEx = card.example;
  else if (card.exampleSentenceGerman) primaryEx = { de: card.exampleSentenceGerman, en: card.exampleSentenceEnglish || "" };

  let cardContent;
  if (state.session.revealed) {
    let backContent = '<div class="translation">'+escapeHtml(card.translation)+'</div>'+
      (card.meaning ? '<div class="meaning">'+escapeHtml(card.meaning)+'</div>' : '');
    if (isNoun && (card.nom || card.akk || card.dat)) {
      backContent += renderExample('Nominativ', card.nom, 'case-nom');
      backContent += renderExample('Akkusativ', card.akk, 'case-akk');
      backContent += renderExample('Dativ', card.dat, 'case-dat');
    } else if (primaryEx) {
      backContent += renderExample('', primaryEx, '');
    }
    cardContent = flipHint + genderBadge + '<div class="german">'+escapeHtml(card.german)+'</div>' + backContent;
  } else {
    const frontExHtml = primaryEx ? '<div class="front-example">„'+escapeHtml(primaryEx.de)+'"</div>' : '';
    cardContent = flipHint + genderBadge + '<div class="german">'+escapeHtml(card.german)+'</div>' + frontExHtml;
  }

  const audioBtn = '<button class="audio-btn" onclick="event.stopPropagation(); speakCurrent();" aria-label="Hear word">🔊</button>';
  const body = '<div class="card flashcard flip-anim" onclick="toggleFlip()" ontouchstart="touchStart(event)" ontouchend="touchEnd(event)">' + audioBtn + cardContent + '</div>';

  const actions = state.session.revealed
    ? '<div class="row"><button class="btn-danger" onclick="rate(\'again\')">↺ Repeat</button><button class="btn-primary" onclick="rate(\'good\')">Next →</button></div>'
    : '';

  const footer = '<div class="spacer"></div><button class="btn-secondary" onclick="endSession()">End session</button>';

  return front + body + actions + footer;
}

function renderProgress() {
  const levels = ["A1","A2","B1"];
  const cards = levels.map(function(level) {
    const s = levelStats(level);
    return '<div class="card"><h2>'+level+'</h2><div class="muted">'+s.reviewed+' of '+s.total+' cards reviewed at least once</div><div class="stats-row"><span>New</span><span class="val">'+s.new+'</span></div><div class="stats-row"><span>Learning</span><span class="val">'+s.learning+'</span></div><div class="stats-row"><span>Learned</span><span class="val">'+s.learned+'</span></div></div>';
  }).join("");
  return '<h1>Your progress</h1><p>Status is derived from how long the scheduler will wait before showing a card again.</p>'+cards+'<button class="btn-danger" onclick="resetProgress()">Reset all progress</button><button class="btn-secondary" onclick="go(\'home\')">Back</button>';
}

function newSessionFromSummary() {
  state.session = null;
  state.screen = "levels";
  render();
}

function renderSummary() {
  const streakLine = state.streak.count > 1
    ? '<p style="text-align:center;margin-top:8px">🔥 ' + state.streak.count + '-day streak — keep it going!</p>'
    : '';
  return '<span class="summary-emoji">🎉</span>'+
    '<h1 style="text-align:center">Nice work!</h1>'+
    '<p style="text-align:center">You finished your session.</p>'+
    streakLine +
    '<div class="spacer"></div>'+
    '<button class="btn-primary" onclick="newSessionFromSummary()">Start another session</button>'+
    '<button class="btn-secondary" onclick="endSession()">Back to Home</button>';
}

function renderGrammar() {
  const filters = ["A1", "A2", "B1", "Cases"];
  const filterButtons = filters.map(function(f) {
    const cls = state.grammarFilter === f ? "btn-primary" : "btn-secondary";
    return '<button class="'+cls+'" onclick="setGrammarFilter(\''+f+'\')">'+f+'</button>';
  }).join("");

  const filtered = GRAMMAR.map(function(s, i){ return {s:s, i:i}; }).filter(function(e) {
    const lv = e.s.level;
    if (state.grammarFilter === "A1") return lv === "A1" || lv === "A1-A2";
    return lv === state.grammarFilter;
  });

  const sections = filtered.map(function(e) {
    const i = e.i, section = e.s;
    const seen = sectionSeenCount(i);
    const total = section.items.length;
    const done = seen === total;
    return '<div class="card grammar-card" onclick="openGrammarSection('+i+')">'+
      '<div class="grammar-card-head"><h2>'+escapeHtml(section.title)+'</h2><span class="level-chip'+(section.level==="Cases"?" chip-cases":"")+'">'+section.level+'</span></div>'+
      '<div class="grammar-section-progress">'+seen+' / '+total+' topics seen'+(done?' ✓':'')+'</div>'+
    '</div>';
  }).join("");

  return '<h1>Grammar guide</h1>'+
    '<div class="grammar-filter-row">'+filterButtons+'</div>'+
    (sections || '<div class="muted" style="margin-bottom:16px">No sections under this filter.</div>')+
    '<button class="btn-secondary" onclick="go(\'home\')">Back to Home</button>';
}

function renderTable(t) {
  if (!t || !t.headers || !t.rows) return '';
  const head = '<thead><tr>' + t.headers.map(function(h){return '<th>'+escapeHtml(h)+'</th>';}).join('') + '</tr></thead>';
  const body = '<tbody>' + t.rows.map(function(row){
    return '<tr>' + row.map(function(cell){return '<td>'+escapeHtml(cell)+'</td>';}).join('') + '</tr>';
  }).join('') + '</tbody>';
  return '<table class="case-table">'+head+body+'</table>';
}

function renderGrammarSection() {
  const section = GRAMMAR[state.grammarSectionIdx];
  const idx = state.grammarItemIdx;
  const item = section.items[idx];
  const total = section.items.length;
  const dots = section.items.map(function(_, i) {
    return '<span class="dot'+(i <= idx ? ' done' : '')+'"></span>';
  }).join("");
  const tableHtml = item.table ? renderTable(item.table) : '';
  const examplesHtml = (item.examples && item.examples.length)
    ? '<div class="grammar-examples-block">'+item.examples.map(function(ex){return '<div class="grammar-example">'+escapeHtml(ex)+'</div>';}).join("")+'</div>'
    : '';
  return '<div class="header-row">'+
    '<span class="muted">'+escapeHtml(section.title)+' · '+section.level+'</span>'+
    '<span class="muted">'+(idx+1)+' / '+total+'</span>'+
    '</div>'+
    '<div class="dot-progress" style="margin-bottom:12px">'+dots+'</div>'+
    '<div class="card grammar-rule-card">'+
      '<div class="grammar-topic">'+escapeHtml(formatTopic(item.topic))+'</div>'+
      '<div class="grammar-rule-text">'+escapeHtml(item.rule)+'</div>'+
      tableHtml +
      examplesHtml +
    '</div>'+
    '<div class="spacer"></div>'+
    '<div class="row">'+
      (idx > 0 ? '<button class="btn-subtle" onclick="prevGrammarItem()">← Previous</button>' : '')+
      '<button class="btn-primary" onclick="nextGrammarItem()">'+(idx === total - 1 ? 'Finish' : 'Next →')+'</button>'+
    '</div>'+
    '<button class="btn-secondary" onclick="openGrammar()">Back to topics</button>';
}

function render() {
  const app = document.getElementById("app");
  if (state.screen === "home") app.innerHTML = renderHome();
  else if (state.screen === "levels") app.innerHTML = renderLevels();
  else if (state.screen === "practice") app.innerHTML = renderPractice();
  else if (state.screen === "progress") app.innerHTML = renderProgress();
  else if (state.screen === "grammar") app.innerHTML = renderGrammar();
  else if (state.screen === "grammar-section") app.innerHTML = renderGrammarSection();
  else if (state.screen === "summary") app.innerHTML = renderSummary();
}

render();
</script>
</body>
</html>
